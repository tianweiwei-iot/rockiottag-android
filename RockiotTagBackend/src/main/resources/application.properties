# 服务器配置
server.port=8081

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/rockiot_tag_hswl?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123066
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池优化（支持 1000 台设备高并发）
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JPA 批量操作优化
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# JWT配置
jwt.secret=RockiotTagSecretKey2026
jwt.expiration=86400000

# 供应商API配置
vendor.api.url=https://device.vernal.ltd/tagapi
vendor.api.cid=6h7lMJOVpVOld5R9CApqH6coCR1W8iqL

# 供应商登录凭证
vendor.username=XHD_HSWL_API
vendor.password=123456

# 数据同步配置
sync.enabled=true
sync.interval=180000
sync.history.interval=7200000

# 日志配置
logging.level.com.rockiot.tag=INFO
logging.level.org.springframework.web=WARN
logging.file.name=logs/rockiot-tag.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
